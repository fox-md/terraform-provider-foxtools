---
version: '3.8'
services:
  nginx01:
    image: nginx:stable-alpine
    hostname: nginx01
    container_name: nginx01
    ports:
      - "8081:80"
    volumes:
      - ./tests/file_download/file1.json:/usr/share/nginx/html/file1.json
      - ./tests/file_download/file-01.txt:/usr/share/nginx/html/file.txt
  nginx02:
    image: nginx:stable-alpine
    hostname: nginx02
    container_name: nginx02
    ports:
      - "8082:80"
    volumes:
      - ./tests/file_download/file1.json:/usr/share/nginx/html/file1.json
      - ./tests/file_download/file-02.txt:/usr/share/nginx/html/file.txt
      - ./tests/htpasswd:/etc/nginx/.htpasswd:ro
      - ./tests/default.conf:/etc/nginx/conf.d/default.conf:ro
  nginx03:
    image: nginx:stable-alpine
    hostname: nginx03
    container_name: nginx03
    ports:
      - "8083:80"
    volumes:
      - ./tests/file_download/file1.json:/usr/share/nginx/html/file1.json
      - ./tests/htpasswd:/etc/nginx/.htpasswd:ro
      - ./tests/default_no_headers.conf:/etc/nginx/conf.d/default.conf:ro
  nginx04:
    image: nginx:stable-alpine
    hostname: nginx04
    container_name: nginx04
    ports:
      - "8084:80"
    volumes:
      - ./tests/file_download/file1.json:/usr/share/nginx/html/file1.json
      - ./tests/htpasswd:/etc/nginx/.htpasswd:ro
      - ./tests/default_no_etag.conf:/etc/nginx/conf.d/default.conf:ro
